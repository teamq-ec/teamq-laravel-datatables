services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: laravel-datatable-api
    volumes:
      - ".:/var/www/html"
    depends_on:
      - mysql
      - mongo
    networks:
      - laravel-datatable-net
  mysql:
    image: 'mysql/mysql-server:8.0'
    container_name: laravel-datatable-db
    ports:
      - '${FORWARD_DB_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: 'root'
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: 'testing'
      MYSQL_USER: 'laravel'
      MYSQL_PASSWORD: 'laravel'
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
      retries: 3
      timeout: 5s
    networks:
      - laravel-datatable-net
  mongo:
    image: 'mongo:7'
    container_name: laravel-datatable-mongo
    ports:
      - '${FORWARD_MONGO_PORT:-27017}:27017'
    healthcheck:
      test:
        - CMD
        - mongosh
        - --eval
        - "db.adminCommand('ping')"
      retries: 3
      timeout: 5s
    networks:
      - laravel-datatable-net
networks:
  laravel-datatable-net:
    driver: bridge
